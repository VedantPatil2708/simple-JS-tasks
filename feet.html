<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="text-align: center;">
        <label for=>feet</label>
        <input id="fet" type="text">
        <br><br>
        <h1>Converting Feet into Inches</h1>
        <br><br>
        <button onclick="conversion()"> click here for conversion</button>
        <br>
        <h1 id="op"></h1>
    </div>
    <script>
        function conversion(){
            let feet = parseInt(document.getElementById("fet").value)
            let inch =feet*12
            console.log(inch)
            document.getElementById("op").innerHTML= + inch
        }
    </script>
    
</body>
</html>
