<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="text-align: center;">
        <h1>Area of Square</h1>
        <label for=>Side</label>
        <input id="sid" type="text">
        
        <br><br>
        <button onclick="calculateArea()"> click here for Area of Square</button>


        <br>
        <h1>Output</h1>
        <h1 id="op">***</h1>
        <br>
    </div>
         

    <script>
        function calculateArea(){
            let Side= parseInt(document.getElementById("sid").value);
            let area= Side*Side; 
            
            console.log(area);
            document.getElementById("op").innerHTML= "Area of Square ="+ area; 
        }
        
    </script>
    
</body>
</html>
